body:
  text: 太上十二上品飛天法輪勸戒妙經太極真人説二十四門戒經太上十二上品飛天法輪勸戒妙經太極真人傳左仙翁我本師元始天尊時在大羅蓋天衆寶宫殿自然香界道德花臺不捨因心誓度舍生即寂而動運平等心以方便故啓衆妙門開大慈惠以無為法利濟三世乃以化身名之虛皇虛皇之號稱為道君道君之化周遍十方三千大千無極世界一一世界有諸國土一一國土現諸化身一一化身放無量光一一光中顯諸真像一一真像圓光晃日明耀通天天日之表無幽不燭圓明之妙有礙皆通舍生受賜動植感恩三途罷對六道升遷天人盈溢地獄空間觸處清淨法界光明然後收諸光明反道合身真儀湛然示啓微妙復彈金指開發玉音是時鍾鼓自鳴天仙踴躍金爐寶桉香煙自薰一切天人及無量衆各增惠力同會無為神開悟解塵慮頓忘入定慧源見無極聖同見無上元始天尊爾時天尊告妙行真人及諸大衆而作是説今日既善今時亦善汝心亦善大衆亦善我故為汝啓運慈悲將護世間少福劣功一切衆生皆可升進不令退沒故我今制無上隄防孚護衆生增進賢善所謂九真妙戒智照之光三界十方歸依信受故我今説安樂衆生實如所言是時衆會預見説者各各定心長跪稽首歸命聖尊普願大慈授我尊戒如是勤請經半劫時諸天散香衆聖獻寶叩頭三請無退轉心爾時天尊見是勤請怡然稱善於是慈尊復作是言一切衆生以愚癡故以貪著故終於長夜遂至磨滅我之憂念慈過父母恩重舍容譬如孩童墮大深穽其穽幽險多黑毒蛇父母聞之生大憂愍先誦神呪禁止毒蛇令子身全不遭吞噬以牢縳寶竿及以鈎梯又令力人入內扶接皆使得出處於坦途諸子愚癡不知畏遠忽有再墮必喪其命父母再告天尊又出籌䇿教以神呪降伏毒蛇復遺於寶竿方去危穽唯我今者其法亦然夫無底三途不過深穽諸苦惱毒有極毒蛇一切有情皆是吾子而尊此戒是神文呪能使無明一念消盡是安樂法是勝進方三世聖賢同所崇奉乃至四八天界五億地居帝王后妃太子公主一切宰官初就位時皆應持誦復次一切道心出家在家四輩男女若貴若賤若山若世一切有情無位異類等人欲受戒時先須清淨發弘誓願往詣師門行道禮念若無師可授要得諸善應當於三寶座前而授誦之云何名為得見善應若於行道禮念之處目洞神光明照如日初小後大三界煥然天地山河無有障礙乃至一切無量妙因是謂光明清淨戒相若不爾者非得戒因若遇大善師是名宿緣慶會不須别見相也今告爾等得遇戒因浩劫難逢此時際會汝發志心齊起善念爾時天尊而説偈頌我以平等心説是真妙戒欲令一切衆安樂坐道場天龍魔鬼神夜又非人等上首能言者普得於受持當知得戒人即入真聖品若天若凡聖咸應恭敬心月朔月望時升諸獅子座端心調正氣和順説是戒凡有聞法音各各默然聽諸有不自誦由信入福堂我故今善時為汝宣妙戒汝等得戒己復當流布聞凡欲受戒時及讀若持誦先當皈三寶次後宣戒文如法持誦人見世七種福汝等當善信無生疑惑心一者短命人應時得增壽二者愚昧性咸開廣大心三者卑賤形漸易尊貴相四者諸貧乏不久成富饒五者醜陋容增益諸端正六者內外病日向得除愈七者惱害緣尋獲大安康當知受戒者其福德若斯未來勝善因億載無窮巳升陟三九位得成無上道隨心滿願天尊天尊説是偈巳普告四衆欲聞大道法音真人戒者內外端正三業清淨諦聽諦受如法受持凡受持戒者歸依三寶同誠稱善無生異念歸依道經師三寶天尊言弟子受真戒者不得屠業為殺及以自殺教他殺方便殺隨喜殺乃至因緣殺不得巳殺報殺悮殺如是種殺皆不可為之愍念有情如巳身命殺害之人六種罪報一者見世轗軻常值惡報二者與一切衆生常為怨讎三者鬼神賊害招集凶禍四者正報死墮地獄劒樹刀山受諸苦惱無時暫息五者雜報禽獸畜生遞相啖食六者縱得人身復遭刑戮是大惡業非真人行殺生惡業罪消滅天尊言弟子受真戒者不得偷盜及取非義財乃至道路遺失風吹禽㗸野間拾得皆不可受或復殺人威勢取與方便歡喜引誘他物毫分錙銖皆不得為盜偷之人五種罪報一者乞托庸身貧窮下賤一者經營不遂百物虛耗水火蟲傷三者常遭口舌財寶散亡四者正報普掠地獄痛毒難伸五者餘報牛馬畜生是大惡業非真人行偷盜惡業罪消滅天尊言弟子受真戒者不得邪淫苟合男女入於濁亂染汚出家侵淩貞潔不别老幼豈論親踈寧揀醜妍那分兄弟如是等緣皆不可為邪淫之人七種罪報一者生死根本二者穢惱之源三者廢修善行四者短命因緣弊失魂爽五者窹𥧌顛倒識性荒迷六者死墮地獄鐵床銅柱身燋骨爛出沒寒池氷戟霜刃死而復生轉輪無息受大苦惱七者雜報豬狗不淨禽獸等身是大惡業非真人行淫邪惡業罪消滅天尊言弟子受真戒者不得妄語誹謗訾毀三寶帝王師尊乃至出家在家持法破法無問凡聖皆應恭敬如法奉承或復異相法門殊教同善可隨順者無起是非誹謗之人六種罪報一者見世惡疾所加二者未來幽暗無曉三者百劫雜報作無目等蟲四者雖處人中常無舌根五者常滯怨憎無人愛敬六者生生世世與善無緣言説不信人所不親是大惡業非真人行毀謗惡業罪消滅天尊言弟子受真戒者不得兩舌惡罵非分毒語傷損有情合造是非兩邊作語乃至鬼神及以凡夫不喜聞見何況聖賢之所聞也惡口之人六種罪報一者見世常遭淩辱二者死墮地獄拔舌犂耕三者為人瘖啞四者人所憎害五者凡百所向常不稱心六者受報豬狗蜂蝎毒蟲之類乃至兩頭之蛇九首之鳥是大惡業非真人行惡口兩舌罪消滅天尊言弟子受真戒者不得嫉妬勝巳抑絶賢明自無道德強生謗毀遂起惡心方便中傷令其破壞起此心者巳損福田何望到頭成就善果嫉妬之人五種罪報一者永不見三寶聖賢二者斷諸善緣凶惡纒繞三者正報愚癡聾盲四者多涉險難自取滅亡五者惡緣惱害無時解脫是大惡業非真人行嫉妬惡業罪消滅天尊言弟子受真戒者不得慳貪損他利已若見衆生心無止足方便曉諭少欲為心貪愛之緣如飲醎水亦如漏器不可盈滿慳貪之人四種罪報一者令人見世多得多失二者過後卑賤飢寒三者餓鬼之身吞火食炭四者當墮豺狼禽蟲畜生等報是大惡業非真人行慳貪惡業罪消滅天尊言弟子受真戒者不得縱恣嗔怒惡口毒語凶暴酷虐嗔怒之人四種罪報一者耗費神氣勢毒所傷二者有情不喜見聞三者死作鴆禽蜂蛇惡獸之類四者縱生人道卑賤愚下是物所輕常無威勢是人惡業非真人行嗔怒惡業罪消滅天尊言弟子受真戒者不得縱恣庸愚自用悖戾欺罔賢善教誨無攺愚戾之人四種罪報一者神明不祐二者斷絶善根三者失正入邪四者鬼魅纒繞是大惡業非真人行庸愚惡業罪消滅天尊言弟子受真戒者不得叛背國王心不忠正興兵動衆傷害無辜不忠之人六種罪報一者自身被苦二者破纍家族三者殁後常處三塗纍劫無出四者報得毒蛇惡獸等身五者雖還人中餘報殘戮六者常生惡處無自在身是大惡業非真人行不忠惡業罪消滅天尊言弟子受真戒者不得無孝順心違逆父母不生敬愛踈背宗親不念慈恩不生慚愧不孝之人六種罪報一者王法所加二者有情同所棄薄三者當墮地獄十苦加身四者鴟梟等形遞相殘害五者縱生人道不孝因緣以為男女更相惱害六者縱橫所加天雷馘斬是大惡業非直人行不孝惡業罪消滅天尊言弟子受真戒者不得飲酒食肉及勸人飲酒食肉飲酒之人有三種罪報一者見世妨失善法乃至未來神識暗鈍二者顛狂昏亂無決照心兼墮蝙蛤往往等身三者縱得人身識性荒迷惡癡等報食肉之人有二種罪報一者善法不行斷慈悲種所在常與衆生報酬為𡨚二者眷屬離散多悲少歡死墮餓鬼地獄豺狼等身是大惡業非真人行飲酒食肉罪消滅天尊曰巳上十二種大惡業速宜退省勤行懴悔若不懴悔身謝之後風刀考身長淪惡趣生生世世與道無緣有識無情不喜聞見何況真智身心自為忍辱天尊説是戒巳復唱是言弟子受真戒次當發弘願使得戒根牢固如玄都山戒相端嚴如玉京殿戒德光明如琉璃珠天人同唱而説偈曰稽首三界主歸命萬道尊願垂真妙戒開度於天人能發片善心精誠心不退威力常加護同歸七寶林太上十二上品飛天法輪勸戒妙經終
